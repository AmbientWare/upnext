name: CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run Docker-backed integration verification"
        required: true
        type: boolean
        default: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          uv sync --all-packages --all-groups
          cd packages/server/web
          bun install --frozen-lockfile

      - name: Verify all packages
        run: bash scripts/verify-all-packages.sh

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: quality
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.run_integration)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --all-packages --all-groups

      - name: Verify backend contract + stream integration
        env:
          UPNEXT_INTEGRATION_ARTIFACT_DIR: .artifacts/integration
        run: bash scripts/verify-integration.sh

      - name: Upload integration artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: integration-artifacts
          path: .artifacts/integration
          if-no-files-found: ignore
