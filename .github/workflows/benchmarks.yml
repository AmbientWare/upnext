name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Benchmark mode"
        required: true
        type: choice
        default: quick
        options:
          - quick
          - full
  workflow_call:
    inputs:
      mode:
        required: false
        type: string
        default: "quick"

jobs:
  benchmark:
    name: Benchmarks (${{ matrix.profile }} / ${{ matrix.workload }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        profile: [base, throughput]
        workload: ${{ fromJSON((inputs.mode == 'full' && '["sustained","burst"]') || '["sustained"]') }}
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --all-packages --group benchmark

      - name: Resolve benchmark args
        id: params
        run: |
          if [ "${{ matrix.workload }}" = "sustained" ]; then
            if [ "${{ inputs.mode }}" = "full" ]; then
              echo "extra_args=--duration-seconds 60 --arrival-rate 200" >> "$GITHUB_OUTPUT"
            else
              echo "extra_args=--duration-seconds 30 --arrival-rate 150" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "extra_args=--jobs 10000" >> "$GITHUB_OUTPUT"
          fi

      - name: Run benchmark
        env:
          UPNEXT_PERF_REDIS_URL: redis://localhost:6379/15
        run: |
          mkdir -p results
          uv run python -m scripts.benchmarks matrix \
            --workload "${{ matrix.workload }}" \
            --profile "${{ matrix.profile }}" \
            --framework upnext-async \
            --framework upnext-sync \
            --framework celery \
            --framework saq \
            --concurrency 32 \
            --repeats 1 \
            --warmups 0 \
            --seed 42 \
            ${{ steps.params.outputs.extra_args }} \
            --fail-on-non-ok \
            --show-runs \
            --output-json "results/benchmark-${{ matrix.profile }}-${{ matrix.workload }}.json" \
            2>&1 | tee "results/benchmark-${{ matrix.profile }}-${{ matrix.workload }}.txt"

      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-results-${{ matrix.profile }}-${{ matrix.workload }}
          path: results

  benchmark-summary:
    name: Benchmarks (aggregate summary)
    runs-on: ubuntu-latest
    needs: benchmark
    if: always()
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --all-packages --group benchmark

      - name: Download benchmark artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: benchmark-results-*
          merge-multiple: true
          path: merged-results

      - name: Validate aggregated payloads
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          from scripts.benchmarks.io import load_matrix_payloads
          payloads = load_matrix_payloads(Path("merged-results"))
          if not payloads:
              raise SystemExit("No benchmark matrix payloads found in merged-results")
          print(f"Found {len(payloads)} benchmark payload(s)")
          PY

      - name: Build aggregated markdown summary
        if: always()
        run: uv run python -m scripts.benchmarks summarize --input merged-results --format markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Build aggregated json summary
        if: always()
        run: uv run python -m scripts.benchmarks summarize --input merged-results --format json --output merged-results/benchmark-summary.json > /dev/null

      - name: Upload aggregated artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-results-aggregate
          path: merged-results
